name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Changez en 'master' si votre branche principale s'appelle master

# Annule les builds en cours si un nouveau commit est poussé sur la même branche
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite génère son livrable de production dans le dossier 'dist'
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    # Octroie les permissions minimales nécessaires pour déployer sur GitHub Pages
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
